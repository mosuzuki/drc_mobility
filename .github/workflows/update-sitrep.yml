name: Auto-update latest INSP SitRep

on:
  schedule:
    # Every 6 hours, UTC. GitHub may delay scheduled jobs by several minutes.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sitrep-auto-update
  cancel-in-progress: false

jobs:
  update-sitrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch latest INSP SitRep and update dashboard data
        id: update
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Override this secret if you want a different extraction-assist model.
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: python scripts/update_from_insp_sitrep.py

      - name: Commit dashboard updates
        if: steps.update.outcome == 'success'
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A data raw extracted README.md DATA_NOTES.md .sitrep_update_status.md 2>/dev/null || true
            if [[ -n $(git diff --cached --name-only) ]]; then
              git commit -m "Auto-update dashboard from latest INSP SitRep"
              git push
            else
              echo "Only untracked/ignored or no relevant changes found."
            fi
          else
            echo "No dashboard changes to commit."
          fi

      - name: Open or update review issue if auto-update failed
        if: steps.update.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE=".sitrep_update_status.md"
          if [[ ! -f "$BODY_FILE" ]]; then
            cat > "$BODY_FILE" <<'EOF'
          # ⚠️ SitRep auto-update failed

          The scheduled SitRep update failed before a detailed status file was produced. Inspect the GitHub Actions logs.
          EOF
          fi
          TITLE="SitRep auto-update needs review"
          ISSUE_NUMBER=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [[ -n "$ISSUE_NUMBER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body-file "$BODY_FILE"
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE"
          fi
          exit 1
